services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev

    container_name: frontend_dev

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true

    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev

    container_name: backend_dev

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    env_file:
      - ./backend/.env

    restart: unless-stopped

  db:
    ports:
      - "27017:27017"

    restart: unless-stopped