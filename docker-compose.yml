services:
  frontend:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - app_network

  backend:
    build: ./backend
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge